apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 基礎層：核心 manifest
namespace: kyklos

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret.yaml
  - pvc.yaml
  - rbac.yaml
  - deployment.yaml
  - service.yaml
  - pdb-networkpolicy.yaml
  - ingress.yaml

# 統一標籤
labels:
  - includeSelectors: true
  - pairs:
      app.kubernetes.io/name: kyklos
      app.kubernetes.io/part-of: kyklos
      app.kubernetes.io/managed-by: kustomize
