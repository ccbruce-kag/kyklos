---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kyklos-data
  namespace: kyklos
  labels:
    app.kubernetes.io/name: kyklos
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  # kyklos 使用 SQLite（backend/kyklos.sqlite3），預估 1Gi 足夠中長期使用
  # 正式環境建議改用 StatefulSet + StorageClass 並配置備份策略
  resources:
    requests:
      storage: 1Gi
  # 預設使用 cluster 上的 default StorageClass
  # 如需指定請在 storageClassName 設定
  # storageClassName: kyklos-ssd
