# GitLab CI/CD 對等設定（可選用）
# 與 .github/workflows/*.yml 功能對等，適合使用 GitLab 倉庫的專案

stages:
  - lint
  - test
  - build
  - scan
  - deploy

variables:
  IMAGE_NAME: ${CI_REGISTRY_IMAGE}
  IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  CARGO_TARGET_DIR: "${CI_PROJECT_DIR}/target"
  NODE_VERSION: "20"
  RUST_VERSION: stable
  DOCKER_BUILDKIT: 1

# ---------- Cache ----------
.cache_npm: &npm_cache
  key:
    files:
      - frontend/package-lock.json
  paths:
    - frontend/node_modules/

.cache_cargo: &cargo_cache
  key:
    files:
      - backend/Cargo.lock
  paths:
    - .cargo/
    - target/

# ---------- 1. Lint ----------
lint:frontend:
  stage: lint
  image: node:${NODE_VERSION}
  before_script:
    - cd frontend && npm ci --no-audit --no-fund
  script:
    - npm run lint
    - npx tsc --noEmit
  cache:
    - <<: *npm_cache
      policy: pull-push
  rules:
    - changes:
        - frontend/**

lint:backend:
  stage: lint
  image: rust:${RUST_VERSION}
  before_script:
    - rustup component add clippy rustfmt
  script:
    - cd backend
    - cargo fmt --all -- --check
    - cargo clippy --all-targets --locked -- -D warnings
  cache:
    - <<: *cargo_cache
      policy: pull-push
  rules:
    - changes:
        - backend/**

# ---------- 2. Test ----------
test:frontend:
  stage: test
  image: node:${NODE_VERSION}
  before_script:
    - cd frontend && npm ci --no-audit --no-fund
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist
    expire_in: 7 days
  cache:
    - <<: *npm_cache
      policy: pull-push
  rules:
    - changes:
        - frontend/**

test:backend:
  stage: test
  image: rust:${RUST_VERSION}
  before_script:
    - apt-get update -qq && apt-get install -y -qq libssl-dev
  script:
    - cd backend
    - cargo test --locked --all-features
    - cargo build --locked --release
  artifacts:
    paths:
      - backend/target/release/kyklos
    expire_in: 7 days
  cache:
    - <<: *cargo_cache
      policy: pull-push
  rules:
    - changes:
        - backend/**

# ---------- 3. k8s 驗證 ----------
k8s:validate:
  stage: test
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl bash
    - curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
    - mv kustomize /usr/local/bin/
  script:
    - kustomize build k8s/base > /tmp/base.yaml
    - kustomize build k8s/overlays/prod > /tmp/prod.yaml
    - echo "✓ kustomize build OK"
  rules:
    - changes:
        - k8s/**

# ---------- 4. Build & Push 映像 ----------
build:image:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker buildx create --use
    - docker buildx build
        --platform linux/amd64,linux/arm64
        --tag "${IMAGE_NAME}:${IMAGE_TAG}"
        --tag "${IMAGE_NAME}:latest"
        --cache-from "type=registry,ref=${IMAGE_NAME}:buildcache"
        --cache-to "type=registry,ref=${IMAGE_NAME}:buildcache,mode=max"
        --push
        .
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ---------- 5. 安全掃描 ----------
scan:trivy:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --severity HIGH,CRITICAL --exit-code 0
        "${IMAGE_NAME}:${IMAGE_TAG}"
  allow_failure: true
  needs: ["build:image"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ---------- 6. 部署 ----------
deploy:staging:
  stage: deploy
  image: bitnami/kubectl:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
    - curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
    - mv kustomize /usr/local/bin/
  script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_STAGING" | base64 -d > ~/.kube/config
    - cd k8s/overlays/prod
    - kustomize edit set image "Miitai/kyklos=${IMAGE_NAME}:${IMAGE_TAG}"
    - kustomize build . | kubectl apply -f -
    - kubectl rollout status deployment/kyklos -n kyklos --timeout=5m
  environment:
    name: staging
    url: https://kyklos-staging.example.com
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy:production:
  stage: deploy
  image: bitnami/kubectl:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
    - curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
    - mv kustomize /usr/local/bin/
  script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_PRODUCTION" | base64 -d > ~/.kube/config
    - cd k8s/overlays/prod
    - kustomize edit set image "Miitai/kyklos=${IMAGE_NAME}:${IMAGE_TAG}"
    - kustomize build . | kubectl apply -f -
    - kubectl rollout status deployment/kyklos -n kyklos --timeout=10m
    - sleep 15
    - STATUS=$(curl -s -o /dev/null -w "%{http_code}" -u "${PROD_ADMIN_USER}:${PROD_ADMIN_PASS}" https://kyklos.example.com/version)
    - if [ "$STATUS" != "200" ]; then echo "Health check failed: $STATUS" && exit 1; fi
  environment:
    name: production
    url: https://kyklos.example.com
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
    - when: manual
      allow_failure: false
  when: manual
