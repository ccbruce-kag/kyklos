---
apiVersion: v1
kind: Service
metadata:
  name: kyklos
  namespace: kyklos
  labels:
    app.kubernetes.io/name: kyklos
  annotations:
    # Prometheus 指標（若未來加入 metrics）
    prometheus.io/scrape: "true"
    prometheus.io/port: "10001"
    prometheus.io/path: "/health"
spec:
  # 因為 Pod 使用 hostNetwork，Service 僅作為 Kubernetes 內部
  # discovery（Ingress 與其他元件的 targetRef）。對外仍透過 hostPort 直接到節點。
  type: ClusterIP
  clusterIP: None  # headless（用於 hostNetwork）
  selector:
    app.kubernetes.io/name: kyklos
  ports:
    - name: http
      port: 10001
      targetPort: http
      protocol: TCP
