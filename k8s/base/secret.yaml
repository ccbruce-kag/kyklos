---
apiVersion: v1
kind: Secret
metadata:
  name: kyklos-secret
  namespace: kyklos
  labels:
    app.kubernetes.io/name: kyklos
type: Opaque
# 預設值僅供本機/測試使用，部署至正式環境請改用：
#   - Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
#   - External Secrets Operator
#   - SOPS + Git
#   - Vault / KMS provider
#
# 產生 bcrypt 雜湊：
#   apt install apache2-utils && htpasswd -nbBC 10 "" 'YOUR_PASSWORD' | tr -d ':\n'
# 或：
#   python3 -c "import bcrypt; print(bcrypt.hashpw(b'PWD', bcrypt.gensalt(rounds=10).decode())"
stringData:
  # Basic Auth 使用者名稱 / 雜湊後的密碼（BCrypt cost >= 10）
  # ⚠️  部署前務必替換為正式環境的強密碼
  IPT_WEB_USERNAME: "admin"
  IPT_WEB_PASSWORD_HASH: "$2y$10$wH8QZqkD6H8S6N6.dummyhashplaceholderforlocaluseonlyreplace"
