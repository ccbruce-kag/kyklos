---
apiVersion: v1
kind: Service
metadata:
  name: kyklos
  annotations:
    # 正式環境：保留客戶端 IP（避免 Service NAT 干擾 firewall 規則）
    service.beta.kubernetes.io/external-traffic-policy: "Local"
spec:
  # 正式環境可改為 NodePort 對應防火牆節點
  type: NodePort
  externalTrafficPolicy: Local
  ports:
    - name: http
      port: 10001
      targetPort: http
      nodePort: 31001
      protocol: TCP
